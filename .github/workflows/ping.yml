name: Keep Render API Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping FTN API
        run: |
          curl -s -o /dev/null https://ftn-index.onrender.com/api/ftn_latest || true
          echo "Ping sent"
