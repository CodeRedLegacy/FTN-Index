name: Keep Render API Alive

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  workflow_dispatch:  # Allows manual trigger for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping FTN API
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://ftn-index.onrender.com/api/ftn_latest
